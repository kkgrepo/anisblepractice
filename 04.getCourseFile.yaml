- name: Demo on file
  hosts: local
  connection: local

  vars_files:
    - course.yaml

  tasks:
    - name: Print data
      debug:
        msg: "DETAILS ARE {{ COURSE }} {{ TRAINER }} {{ DURATION }}"

- name: demo on vars_files
  hosts: local
  connection: local
  vars_files:
  - course.yaml
  tasks:
  - name: print variables information
    debug:
      msg: "Hi, I am learning {{ COURSE }}, Trainer is {{ TRAINER }}, Duration is {{ DURATION }}"